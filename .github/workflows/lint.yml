name: Lint & Validate

on:
  push:
    branches: [main]
    paths: ['**.md', '**.yaml', '**.yml', 'scripts/**']
  pull_request:
    branches: [main]
    paths: ['**.md', '**.yaml', '**.yml', 'scripts/**']

jobs:
  validate-skills:
    name: Validate Skill Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate frontmatter
        run: |
          chmod +x scripts/validate-skills.sh
          ./scripts/validate-skills.sh

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'
        continue-on-error: true

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          additional_files: 'install.sh auto-update.sh check-deps.sh'
        continue-on-error: true

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yml . || true
        continue-on-error: true
